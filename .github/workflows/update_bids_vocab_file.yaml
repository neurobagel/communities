name: Update imaging modality vocab file from BIDS schema

on:
  # TODO: Once we have better-defined handling of BIDS suffix hierarchies (or once BIDS offers this)
  # we can consider switching to a schedule-based workflow (e.g., monthly)
  workflow_dispatch:

jobs:
  update-bids-vocab:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate a Neurobagel Bot token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.NB_BOT_ID }}
          private-key: ${{ secrets.NB_BOT_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync

      - name: Run script to update BIDS imaging modality vocab file
        run: uv run code/create_imaging_vocab_from_bids_schema.py "configs/Neurobagel"

      - name: Get Neurobagel Bot App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.generate-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Configure git for Neurobagel Bot user
        run: |
          git config --global user.name '${{ steps.generate-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Commit and push any changes
        run: |
          git add configs/Neurobagel
          git commit -m "[bot] Update imaging modality vocab file from BIDS schema" || true
          git push origin main
